name: Ordered Image Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout image-data branch
        uses: actions/checkout@v4
        with:
          ref: image-data

      - name: Select next 240x320 image
        shell: bash
        run: |
          set -e

          mkdir -p data

mapfile -t files < <(find data/images_240x320 -maxdepth 1 -type f -name "*.csv" | sort)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No CSV files found in data/images_240x320"
            exit 1
          fi

          last=""
          if [ -f data/lastfile.txt ]; then
            last=$(cat data/lastfile.txt)
          fi

          next="${files[0]}"

          for i in "${!files[@]}"; do
            if [ "${files[$i]}" = "$last" ]; then
              next_index=$(( (i + 1) % ${#files[@]} ))
              next="${files[$next_index]}"
              break
            fi
          done

          echo "Selected image: $next"

          python3 - <<PY
          import re
          import sys
          from pathlib import Path

          selected = Path("$next")
          output = Path("data/current.csv")

          text = selected.read_text(encoding="utf-8", errors="ignore")

          values = re.findall(r"0x[0-9a-fA-F]{4}(?![0-9a-fA-F])", text)

          expected = 240 * 320

          if len(values) != expected:
              print(f"ERROR: {selected} has {len(values)} RGB565 values, expected {expected}")
              sys.exit(1)

          with output.open("w", encoding="utf-8") as f:
              for i, value in enumerate(values, start=1):
                  f.write(value.lower())
                  if i % 240 == 0:
                      f.write("\\n")
                  else:
                      f.write(",")

          print(f"Wrote {len(values)} values to {output}")
          PY

          echo "$next" > data/lastfile.txt

      - name: Commit updated current.csv
        shell: bash
        run: |
          git config user.name "github-action[bot]"
          git config user.email "github-action[bot]@users.noreply.github.com"

          git add data/current.csv data/lastfile.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "update current image in order"
          git push origin HEAD:image-data