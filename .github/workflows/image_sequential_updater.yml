name: Ordered RLE Image Updater

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: ordered-rle-image-updater
  cancel-in-progress: false

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout image-data branch
        uses: actions/checkout@v4
        with:
          ref: image-data

      - name: Select next RLE image
        shell: bash
        run: |
          set -e

          mkdir -p data

          mapfile -t files < <(find data/Encoded -maxdepth 1 -type f -name "*.rle" | sort)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No RLE files found in data/Encoded"
            exit 1
          fi

          last=""
          if [ -f data/lastfile.txt ]; then
            last=$(cat data/lastfile.txt)
          fi

          next="${files[0]}"

          for i in "${!files[@]}"; do
            if [ "${files[$i]}" = "$last" ]; then
              next_index=$(( (i + 1) % ${#files[@]} ))
              next="${files[$next_index]}"
              break
            fi
          done

          echo "Selected RLE image: $next"

          python3 - <<PY
          import sys
          import struct
          from pathlib import Path

          selected = Path("$next")
          output = Path("data/current.rle")

          expected_pixels = 135 * 240

          data = selected.read_bytes()

          if len(data) == 0:
              print(f"ERROR: {selected} is empty")
              sys.exit(1)

          if len(data) % 4 != 0:
              print(f"ERROR: {selected} size is not divisible by 4")
              print(f"Size: {len(data)} bytes")
              sys.exit(1)

          pixels = 0
          runs = 0

          for i in range(0, len(data), 4):
              count, colour = struct.unpack_from("<HH", data, i)

              if count == 0:
                  print(f"ERROR: zero-length RLE run at byte {i}")
                  sys.exit(1)

              pixels += count
              runs += 1

          if pixels != expected_pixels:
              print(f"ERROR: {selected} decodes to {pixels} pixels, expected {expected_pixels}")
              sys.exit(1)

          output.write_bytes(data)

          print(f"Validated {selected}")
          print(f"Runs: {runs}")
          print(f"Decoded pixels: {pixels}")
          print(f"Wrote binary RLE to {output}")
          PY

          echo "$next" > data/lastfile.txt

      - name: Commit updated current.rle
        shell: bash
        run: |
          git config user.name "github-action[bot]"
          git config user.email "github-action[bot]@users.noreply.github.com"

          git add data/current.rle data/lastfile.txt

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "update current RLE image to $(cat data/lastfile.txt)"
          git push origin HEAD:image-data