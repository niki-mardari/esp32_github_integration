name: Image Updater

on:
  schedule:
    # Runs every 15 mins
    - cron: '*/15 * * * *'
  workflow_dispatch:

premissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/Checkout@v4
      - name: Update the file
        run: bash ./scripts/random_file.sh
      - name: Commit and Push
        run: |
          git config user.name "github-action[bot]"
          git config user.email "github-action[bot]@users.noreply.github.com"
          git add ./data/current.csv
          git add ./data/lastfile.txt
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "automatic file change $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

